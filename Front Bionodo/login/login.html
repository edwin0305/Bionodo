<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BIONODO</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <script src="../assets/runtime-config.js"></script>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="background"></div>

  <main class="login-container">
    <section class="login-card">
      <div class="logo-container">
        <img src="../assets/logo.png" alt="Logo de Bionodo">
      </div>

      <h1>BIONODO</h1>
      <p class="subtitle">Iniciar sesión</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="tipoUsuario">Tipo de acceso</label>
          <select id="tipoUsuario" name="tipoUsuario">
            <option value="usuario">Usuario</option>
            <option value="admin">Administrador</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="Ingrese su correo">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingrese su contraseña">
        </div>

        <button type="submit" class="btn-login">Ingresar</button>
      </form>

      <div id="message" class="message"></div>

      <div class="extra-links">
        <p>¿No tienes cuenta? <a href="../registro/registro.html">Regístrate</a></p>
      </div>
    </section>
  </main>

  <script src="../assets/app-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
