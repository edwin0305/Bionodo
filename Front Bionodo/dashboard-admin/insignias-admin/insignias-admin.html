<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insignias - BIONODO</title>
  <link rel="icon" type="image/png" href="../../assets/logo.png">
  <script src="../../assets/runtime-config.js"></script>
  <link rel="stylesheet" href="insignias-admin.css">
</head>
<body>
  <div class="background"></div>

  <main class="insignias-container">
    <section class="insignias-card">
      <div class="logo-container">
        <img src="../../assets/logo.png" alt="Logo de Bionodo">
      </div>

      <h1>BIONODO</h1>
      <p class="subtitle">Gestión de insignias</p>

      <div class="top-actions">
        <button class="btn-secondary" onclick="volverDashboard()">Volver al dashboard</button>
        <button class="btn-secondary" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <section class="accordion-box">
        <button class="accordion-toggle active" type="button" data-target="buscarIdSection">
          <span>Buscar insignia por ID</span>
          <span class="accordion-icon">−</span>
        </button>

        <div class="accordion-content show" id="buscarIdSection">
          <div class="search-box">
            <input type="number" id="searchId" placeholder="Ingrese el ID de la insignia">
            <button class="btn-primary" id="btnBuscarId">Buscar por ID</button>
          </div>
        </div>
      </section>

      <section class="accordion-box">
        <button class="accordion-toggle" type="button" data-target="buscarCodigoSection">
          <span>Buscar insignia por código</span>
          <span class="accordion-icon">+</span>
        </button>

        <div class="accordion-content" id="buscarCodigoSection">
          <div class="search-box">
            <input type="text" id="searchCodigo" placeholder="Ingrese el código de la insignia">
            <button class="btn-primary" id="btnBuscarCodigo">Buscar por código</button>
            <button class="btn-secondary" id="btnRecargar">Mostrar todas</button>
          </div>
        </div>
      </section>

      <section class="accordion-box">
        <button class="accordion-toggle" type="button" data-target="guardarSection">
          <span>Crear / actualizar insignia</span>
          <span class="accordion-icon">+</span>
        </button>

        <div class="accordion-content" id="guardarSection">
          <div class="editing-banner" id="editingBanner">Modo edición activado</div>

          <form id="insigniaForm" class="form-grid" novalidate>
            <div class="form-group">
              <label for="codigoInsignia">Código de insignia</label>
              <input type="text" id="codigoInsignia" placeholder="Ingrese el código">
              <small id="codigoInsigniaError" class="field-message"></small>
            </div>

            <div class="form-group">
              <label for="nombreInsignia">Nombre</label>
              <input type="text" id="nombreInsignia" placeholder="Ingrese el nombre">
              <small id="nombreInsigniaError" class="field-message"></small>
            </div>

            <div class="form-group full-width">
              <label for="descripcionInsignia">Descripción</label>
              <textarea id="descripcionInsignia" placeholder="Ingrese la descripción"></textarea>
              <small id="descripcionInsigniaError" class="field-message"></small>
            </div>

            <div class="form-group full-width">
              <label for="imagenInsignia">Imagen</label>
              <input type="file" id="imagenInsignia" accept="image/*">
              <small id="imagenInsigniaError" class="field-message"></small>
              <div id="previewContainer" class="preview-single"></div>
            </div>

            <div class="form-actions full-width">
              <button type="button" class="btn-primary" id="btnGuardarInsignia">Guardar insignia</button>
              <button type="button" class="btn-secondary" id="btnActualizarInsignia">Actualizar insignia</button>
              <button type="button" class="btn-secondary" id="btnLimpiarFormulario">Limpiar</button>
            </div>
          </form>
        </div>
      </section>

      <div id="message" class="message"></div>

      <section class="accordion-box">
        <button class="accordion-toggle active" type="button" data-target="listaSection">
          <span>Insignias registradas</span>
          <span class="accordion-icon">−</span>
        </button>

        <div class="accordion-content show" id="listaSection">
          <div class="list-header">
            <span id="totalInsignias" class="badge">0 insignias</span>
          </div>
          <div id="insigniasContainer" class="insignias-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="detailModal" class="modal hidden">
    <div class="modal-content large-modal">
      <h3>Detalle de la insignia</h3>
      <div id="detailContent" class="detail-layout"></div>
      <button class="btn-primary" id="closeDetailBtn">Cerrar</button>
    </div>
  </div>

  <div id="deleteModal" class="modal hidden">
    <div class="modal-content">
      <h3>Confirmar eliminación</h3>
      <p id="deleteText">¿Deseas eliminar esta insignia?</p>
      <div class="modal-actions">
        <button class="btn-danger" id="confirmDeleteBtn">Eliminar</button>
        <button class="btn-secondary" id="cancelDeleteBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="successModal" class="modal hidden">
    <div class="modal-content">
      <div class="success-icon">✓</div>
      <h3>Operación exitosa</h3>
      <p id="successText">La acción se realizó correctamente.</p>
      <button class="btn-primary" id="closeSuccessBtn">Aceptar</button>
    </div>
  </div>

  <div id="imageViewerModal" class="modal hidden">
    <div class="modal-content image-viewer-modal">
      <button type="button" id="closeImageViewerBtn" class="close-image-btn">×</button>
      <img id="imageViewerImg" src="" alt="Vista ampliada de la imagen">
    </div>
  </div>

  <script src="../../assets/app-config.js"></script>
  <script src="insignias-admin.js"></script>
</body>
</html>
