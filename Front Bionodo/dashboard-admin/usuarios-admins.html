<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios - BIONODO</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <script src="../assets/runtime-config.js"></script>
  <link rel="stylesheet" href="usuarios-admins.css">
</head>
<body>
  <div class="background"></div>

  <main class="usuarios-container">
    <section class="usuarios-card">
      <div class="logo-container">
        <img src="../assets/logo.png" alt="Logo de Bionodo">
      </div>

      <h1>BIONODO</h1>
      <p class="subtitle">Gestión de usuarios</p>

      <div class="top-actions">
        <button class="btn-secondary" onclick="volverDashboard()">Volver al dashboard</button>
        <button class="btn-secondary" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <section class="accordion-box">
        <button class="accordion-toggle active" type="button" data-target="buscarSection">
          <span>Buscar usuario por correo</span>
          <span class="accordion-icon">−</span>
        </button>

        <div class="accordion-content show" id="buscarSection">
          <div class="search-box">
            <input type="text" id="searchEmail" placeholder="Ingrese el correo del usuario">
            <button class="btn-primary" id="btnBuscar">Buscar</button>
            <button class="btn-secondary" id="btnRecargar">Mostrar todos</button>
          </div>
        </div>
      </section>

      <section class="accordion-box">
        <button class="accordion-toggle" type="button" data-target="agregarSection">
          <span>Agregar usuario</span>
          <span class="accordion-icon">+</span>
        </button>

        <div class="accordion-content" id="agregarSection">
          <form id="usuarioForm" class="form-grid" novalidate>
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" placeholder="Ingrese el nombre">
              <small id="nombreError" class="field-message"></small>
            </div>

            <div class="form-group">
              <label for="apellido">Apellido</label>
              <input type="text" id="apellido" placeholder="Ingrese el apellido">
              <small id="apellidoError" class="field-message"></small>
            </div>

            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <input type="email" id="email" placeholder="Ingrese el correo">
              <small id="emailError" class="field-message"></small>
            </div>

            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input type="text" id="telefono" placeholder="Ingrese el teléfono">
              <small id="telefonoError" class="field-message"></small>
            </div>

            <div class="form-group">
              <label for="edad">Edad</label>
              <input type="number" id="edad" placeholder="Ingrese la edad">
              <small id="edadError" class="field-message"></small>
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input type="password" id="password" placeholder="Ingrese la contraseña">
              <small id="passwordError" class="field-message"></small>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary">Guardar usuario</button>
            </div>
          </form>
        </div>
      </section>

      <div id="message" class="message"></div>

      <section class="accordion-box">
        <button class="accordion-toggle active" type="button" data-target="listaSection">
          <span>Usuarios registrados</span>
          <span class="accordion-icon">−</span>
        </button>

        <div class="accordion-content show" id="listaSection">
          <div class="list-header">
            <span id="totalUsuarios" class="badge">0 usuarios</span>
          </div>
          <div id="usersContainer" class="users-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="detailModal" class="modal hidden">
    <div class="modal-content">
      <h3>Detalle del usuario</h3>
      <div id="detailContent" class="detail-list"></div>
      <button class="btn-primary" id="closeDetailBtn">Cerrar</button>
    </div>
  </div>

  <div id="deleteModal" class="modal hidden">
    <div class="modal-content">
      <h3>Confirmar eliminación</h3>
      <p id="deleteText">¿Deseas eliminar este usuario?</p>
      <div class="modal-actions">
        <button class="btn-danger" id="confirmDeleteBtn">Eliminar</button>
        <button class="btn-secondary" id="cancelDeleteBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="successModal" class="modal hidden">
    <div class="modal-content">
      <div class="success-icon">✓</div>
      <h3>Operación exitosa</h3>
      <p id="successText">La acción se realizó correctamente.</p>
      <button class="btn-primary" id="closeSuccessBtn">Aceptar</button>
    </div>
  </div>

  <script src="../assets/app-config.js"></script>
  <script src="usuarios-admins.js"></script>
</body>
</html>
