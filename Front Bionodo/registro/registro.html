<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - BIONODO</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <script src="../assets/runtime-config.js"></script>
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <div class="background"></div>

  <main class="registro-container">
    <section class="registro-card">
      <div class="logo-container">
        <img src="../assets/logo.png" alt="Logo de Bionodo">
      </div>

      <h1>BIONODO</h1>
      <p class="subtitle">Registro de usuario</p>

      <form id="registroForm" novalidate>
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre">
          <small class="field-message" id="nombreError"></small>
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido">
          <small class="field-message" id="apellidoError"></small>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="Ingrese su correo">
          <small class="field-message" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono" placeholder="Ingrese su teléfono">
          <small class="field-message" id="telefonoError"></small>
        </div>

        <div class="form-group">
          <label for="edad">Edad</label>
          <input type="number" id="edad" name="edad" placeholder="Ingrese su edad">
          <small class="field-message" id="edadError"></small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingrese su contraseña">
          <small class="field-message" id="passwordError"></small>
        </div>

        <button type="submit" class="btn-registro">Registrarse</button>
      </form>

      <div id="message" class="message"></div>

      <div class="extra-links">
        <p>¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión</a></p>
      </div>
    </section>
  </main>

  <!-- Modal de éxito -->
  <div id="successModal" class="modal hidden">
    <div class="modal-content">
      <div class="success-icon">✓</div>
      <h2>Registro exitoso</h2>
      <p>Tu cuenta fue creada correctamente.</p>
      <p>Serás redireccionado al login en <span id="countdown">3</span> segundos...</p>
      <button id="goLoginBtn" class="btn-modal">Ir ahora</button>
    </div>
  </div>

  <script src="../assets/app-config.js"></script>
  <script src="registro.js"></script>
</body>
</html>
